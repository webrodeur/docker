version: "3.9"
services:
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: Kavita
    hostname: kavita
    mem_limit: 4g
    cpu_shares: 768
    security_opt:
      - no-new-privileges:true
    ports:
      - 5000:5000
    volumes:
      - /volume2/docker/kavita/config:/kavita/config:rw
      - /volume2/docker/kavita/data:/manga:rw
    restart: on-failure:5
